services:
  postgres:
    image: postgres:16
    container_name: dcss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_NON_ROOT_USER: ${POSTGRES_NON_ROOT_USER}
      POSTGRES_NON_ROOT_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: dcss-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      TZ: ${TZ}

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    container_name: dcss-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:${N8N_PORT}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_NON_ROOT_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD}

      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: ${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      N8N_RUNNERS_ENABLED: ${N8N_RUNNERS_ENABLED}
      N8N_RUNNERS_MODE: ${N8N_RUNNERS_MODE}
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_NATIVE_PYTHON_RUNNER: ${N8N_NATIVE_PYTHON_RUNNER}

      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      N8N_WEBHOOK_SHARED_SECRET: ${N8N_WEBHOOK_SHARED_SECRET}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      TZ: ${TZ}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  task-runners:
    image: n8nio/runners:${N8N_IMAGE_TAG:-latest}
    container_name: dcss-n8n-runners
    restart: unless-stopped
    environment:
      N8N_RUNNERS_MODE: ${N8N_RUNNERS_MODE}
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      TZ: ${TZ}
    depends_on:
      n8n:
        condition: service_started

  python-worker:
    build:
      context: ./python-worker
    container_name: dcss-python-worker
    restart: unless-stopped
    environment:
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_WEBHOOK_SHARED_SECRET: ${N8N_WEBHOOK_SHARED_SECRET}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_NON_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_NON_ROOT_PASSWORD}
      N8N_INTERNAL_HEALTH_URL: http://n8n:5678/healthz
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      AGENT_WORKER_ENABLED: ${AGENT_WORKER_ENABLED:-true}
      AGENT_WORKER_POLL_SEC: ${AGENT_WORKER_POLL_SEC:-3}
      AGENT_WORKER_BATCH_SIZE: ${AGENT_WORKER_BATCH_SIZE:-2}
      AGENT_SCHEDULE_TIMEZONE: ${AGENT_SCHEDULE_TIMEZONE:-America/New_York}
      AGENT_APPROVER_USER_IDS: ${AGENT_APPROVER_USER_IDS:-}
      NEWS_FLASH_SOURCES: ${NEWS_FLASH_SOURCES:-}
      NEWS_FLASH_MAX_ITEMS: ${NEWS_FLASH_MAX_ITEMS:-8}
      NEWS_FLASH_TIMEOUT_SEC: ${NEWS_FLASH_TIMEOUT_SEC:-8}
      CODEX_JOB_QUEUE_DIR: /codex-jobs
      CODEX_ALLOWED_WORKDIRS: ${CODEX_ALLOWED_WORKDIRS:-/opt/dcss-n8n,/home/codexvps/Desktop}
      DISCORD_MAX_TIMESTAMP_AGE_SEC: ${DISCORD_MAX_TIMESTAMP_AGE_SEC:-300}
      N8N_PROXY_TIMEOUT_SEC: ${N8N_PROXY_TIMEOUT_SEC:-10}
      LOG_LEVEL: ${PYTHON_WORKER_LOG_LEVEL:-INFO}
      TZ: ${TZ}
    volumes:
      - ../codex-jobs:/codex-jobs
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      n8n:
        condition: service_started


volumes:
  postgres_data:
  n8n_data:
  ollama_data:
